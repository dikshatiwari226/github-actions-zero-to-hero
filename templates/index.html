<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevOps Zero To Hero</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
        font-family: system-ui, sans-serif;
        color: #e0e0e0;
      }

      .container {
        text-align: center;
        max-width: 640px;
      }

      h1 {
        font-size: 2.4rem;
        margin-bottom: 0.5rem;
        background: linear-gradient(90deg, #00d2ff, #7b2ff7);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .badge {
        display: inline-block;
        margin: 1rem 0 2rem;
        padding: 0.4rem 1.2rem;
        border: 1px solid #7b2ff7;
        border-radius: 999px;
        font-size: 0.85rem;
        color: #c4b5fd;
      }

      .cards {
        display: flex;
        gap: 1rem;
        justify-content: center;
        flex-wrap: wrap;
      }

      .card {
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        padding: 1.4rem;
        min-width: 150px;
      }

      .card span {
        display: block;
        font-size: 0.75rem;
        text-transform: uppercase;
        color: #9ca3af;
        margin-bottom: 0.3rem;
      }

      .card strong {
        font-size: 1.2rem;
        color: #f9fafb;
      }

      .ci {
        margin-top: 1.5rem;
        font-size: 0.85rem;
        color: #9ca3af;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>DevOps Zero To Hero</h1>

      <div class="badge">Josh Batch 10</div>

      <!-- GitHub Actions CI Badge -->
      <p>
        <img
          src="https://img.shields.io/github/actions/workflow/status/YOUR_USERNAME/YOUR_REPO/deploy.yml?label=CI%20Pipeline&logo=github"
        />
      </p>

      <div class="cards">
        <div class="card">
          <span>Framework</span>
          <strong>Flask 3.1</strong>
        </div>

        <div class="card">
          <span>Runtime</span>
          <strong>Python 3.14</strong>
        </div>

        <div class="card">
          <span>Deploy</span>
          <strong>AWS ECS</strong>
        </div>

        <div class="card">
          <span>Status</span>
          <strong>Build ✓ Lint ✓ Deploy ✓</strong>
        </div>
      </div>

      <p class="ci">
        Built, lint-checked and deployed automatically using GitHub Actions.
      </p>
    </div>
  </body>
</html>
