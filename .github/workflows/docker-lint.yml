#  Scan  the Dockerfile for issues and CVEs
name: Docker Lint

on:
  workflow_call:

jobs:
  validates-dockerfile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
